services:
  chatbot:
    image: chatbot:latest
    container_name: chatbot
    restart: unless-stopped
    # Bind to loopback only; the Cloudflare "Easy Branch" tunnel reaches it here.
    ports:
      - "127.0.0.1:3005:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
